name: Build

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      archives_path:
        description: 'Папка, в которой искать .zip архивы для распаковки (относительно корня репозитория)'
        required: false
        default: '.'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Ищет все .zip архивы в репозитории (например ресурспаки) и распаковывает
      # каждый в отдельную папку внутри extracted/. Не влияет на сборку плагина,
      # но полезно для валидации/подготовки прикладываемых архивов в CI.
      - name: Extract zip archives
        run: |
          SEARCH_PATH="${{ github.event.inputs.archives_path || '.' }}"
          mkdir -p extracted

          FOUND=0
          while IFS= read -r -d '' archive; do
            FOUND=1
            name="$(basename "$archive" .zip)"
            dest="extracted/$name"
            mkdir -p "$dest"
            echo "Распаковка: $archive -> $dest"
            unzip -o -q "$archive" -d "$dest"
          done < <(find "$SEARCH_PATH" \
              -iname "*.zip" \
              -not -path "*/target/*" \
              -not -path "*/.git/*" \
              -not -path "*/extracted/*" \
              -print0)

          if [ "$FOUND" -eq 0 ]; then
            echo "Zip-архивы не найдены — пропускаем."
          else
            echo "Готово. Содержимое extracted/:"
            find extracted -maxdepth 2
          fi

      - name: Upload extracted archives
        if: hashFiles('extracted/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: extracted-archives
          path: extracted/
          if-no-files-found: ignore

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn -B clean package --file pom.xml

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: GraveRP
          path: target/GraveRP.jar
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: target/GraveRP.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
